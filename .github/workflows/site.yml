name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "mkdocs.yml"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r website/requirements.txt
      - run: mkdocs gh-deploy --force --no-history
